/* ========== 全局样式 ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #e67e22;
  --primary-dark: #d35400;
  --primary-light: #fdebd0;
  --bg: #fefaf5;
  --card-bg: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #f0e6da;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-hover: 0 6px 24px rgba(0,0,0,0.10);
  --radius: 14px;
  --tag-soup: #27ae60;
  --tag-stir: #e74c3c;
  --tag-stew: #8e44ad;
  --tag-cold: #3498db;
  --tag-staple: #f39c12;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* ========== 头部 ========== */
.header {
  background: linear-gradient(135deg, #e67e22 0%, #f39c12 30%, #d35400 100%);
  color: white;
  text-align: center;
  padding: 32px 20px 28px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.10) 0%, transparent 60%);
  animation: headerShine 6s ease-in-out infinite;
}
@keyframes headerShine {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(5%, 3%); }
}
.header h1 {
  font-size: 2.2em;
  font-weight: 700;
  position: relative;
  z-index: 1;
  text-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.header p {
  font-size: 1.05em;
  opacity: 0.9;
  margin-top: 6px;
  position: relative;
  z-index: 1;
}

/* ========== 主容器 ========== */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 24px 40px;
}

/* ========== 已选食材栏 ========== */
.selected-bar {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  min-height: 52px;
  border: 2px dashed transparent;
  transition: border-color 0.3s;
}
.selected-bar:has(.selected-tag) {
  border-color: var(--primary);
}
.selected-label {
  font-weight: 600;
  color: var(--text-light);
  font-size: 0.95em;
  white-space: nowrap;
}
.selected-tag {
  background: var(--primary-light);
  color: var(--primary-dark);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.9em;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  animation: popIn 0.25s ease-out;
}
@keyframes popIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.selected-tag .remove {
  cursor: pointer;
  font-size: 1.1em;
  line-height: 1;
  color: #c0392b;
  transition: transform 0.2s;
}
.selected-tag .remove:hover {
  transform: scale(1.3);
}
.clear-btn {
  margin-left: auto;
  background: none;
  border: 1px solid #e0d5c5;
  color: #999;
  padding: 5px 14px;
  border-radius: 16px;
  cursor: pointer;
  font-size: 0.85em;
  transition: all 0.2s;
}
.clear-btn:hover {
  background: #fdebd0;
  color: var(--primary-dark);
  border-color: var(--primary);
}

/* ========== 食材选择区 ========== */
.ingredients-section {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.ingredients-section h3 {
  font-size: 1.15em;
  margin-bottom: 12px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.ingredients-section h3::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 20px;
  background: var(--primary);
  border-radius: 2px;
}
.category-group {
  margin-bottom: 16px;
}
.category-group:last-child { margin-bottom: 0; }
.category-title {
  font-size: 0.9em;
  font-weight: 600;
  color: var(--primary-dark);
  margin-bottom: 8px;
  padding-left: 2px;
}
.ingredient-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.ingredient-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: #fefefe;
  cursor: pointer;
  font-size: 0.92em;
  color: var(--text);
  transition: all 0.2s ease;
  user-select: none;
  white-space: nowrap;
}
.ingredient-btn:hover {
  border-color: var(--primary);
  background: #fff8f0;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(230,126,34,0.12);
}
.ingredient-btn.selected {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  font-weight: 600;
  box-shadow: 0 3px 12px rgba(230,126,34,0.3);
  transform: translateY(-1px);
}
.ingredient-btn .emoji {
  font-size: 1.2em;
}

/* ========== 分类标签 ========== */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.filter-btn {
  padding: 8px 18px;
  border: 1.5px solid var(--border);
  border-radius: 22px;
  background: var(--card-bg);
  cursor: pointer;
  font-size: 0.9em;
  color: var(--text);
  font-weight: 500;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}
.filter-btn:hover {
  border-color: var(--primary);
  color: var(--primary-dark);
}
.filter-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 3px 12px rgba(230,126,34,0.25);
}

/* ========== 食谱结果区 ========== */
.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.results-header h2 {
  font-size: 1.3em;
  color: var(--text);
}
.results-count {
  color: var(--text-light);
  font-size: 0.9em;
}
.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
}

/* ========== 食谱卡片 ========== */
.recipe-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  cursor: default;
}
.recipe-card:hover {

  transform: translateY(-3px);
}
.recipe-card-top {

  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;

.recipe-name {
  font-size: 1.15em;
  font-weight: 700;
  color: var(--text);

.recipe-badge {

  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.75em;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  flex-shrink: 0;

.badge-soup { background: var(--tag-soup); }
.badge-stir { background: var(--tag-stir); }
.badge-stew { background: var(--tag-stew); }
.badge-cold { background: var(--tag-cold); }
.badge-staple { background: var(--tag-staple); }

.recipe-card-body {

.recipe-match {

  gap: 5px;

.match-tag {

}
.recipe-desc {
  font-size: 0.88em;
  color: var(--text-light);
  line-height: 1.5;
}

.recipe-card-bottom {

  display: flex;
  gap: 10px;
}
.recipe-link {

  align-items: center;
  gap: 5px;

  font-size: 0.85em;

.recipe-link.text {

/* ========== 空状态 ========== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);

.empty-state .icon {
  font-size: 4em;
  margin-bottom: 16px;

.empty-state h3 {
  font-size: 1.2em;
  margin-bottom: 8px;
  color: var(--text);
}
.empty-state p {
  font-size: 0.95em;
  max-width: 400px;
  margin: 0 auto;

/* ========== 底部 ========== */
.footer {
  text-align: center;
  padding: 24px;
  color: #bbb;
  font-size: 0.85em;
}

/* ========== 响应式 ========== */
@media (max-width: 640px) {
  .header h1 { font-size: 1.5em; }

  .container { padding: 12px; }

    grid-template-columns: 1fr;
  }
  .ingredient-btn {
    padding: 6px 10px;
    font-size: 0.82em;

</head>

// ==================== 状态管理 ====================
let selectedIngredients = new Set();
let currentFilter = 'all';

// ==================== 渲染食材按钮 ====================
function renderIngredients() {
  const section = document.getElementById('ingredientsSection');
  let html = '<h3>🥬 选择你手边的食材</h3>';

  ingredientCategories.forEach(cat => {
    html += `<div class="category-group">
      <div class="category-title">${cat.name}</div>
      <div class="ingredient-grid">`;
    cat.items.forEach(item => {
      const sel = selectedIngredients.has(item.name) ? ' selected' : '';
      html += `<button class="ingredient-btn${sel}" data-ingredient="${item.name}">
        <span class="emoji">${item.emoji}</span>${item.name}
      </button>`;
    });
    html += '</div></div>';
  });

  section.innerHTML = html;

  // 绑定事件
  section.querySelectorAll('.ingredient-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleIngredient(btn.dataset.ingredient));
  });
}

// ==================== 切换食材选择 ====================
function toggleIngredient(name) {
  if (selectedIngredients.has(name)) {
    selectedIngredients.delete(name);
  } else {
    selectedIngredients.add(name);
  }
  updateSelectedBar();
  renderIngredients();
  renderRecipes();
}

// ==================== 更新已选食材栏 ====================
function updateSelectedBar() {
  const tagsContainer = document.getElementById('selectedTags');
  const clearBtn = document.getElementById('clearBtn');
  const emptyHint = document.getElementById('emptyHint');

  if (selectedIngredients.size === 0) {
    tagsContainer.innerHTML = '';
    clearBtn.style.display = 'none';
    emptyHint.style.display = 'inline';
    return;
  }

  emptyHint.style.display = 'none';
  clearBtn.style.display = 'inline-block';

  let html = '';
  selectedIngredients.forEach(name => {
    // 找到emoji
    let emoji = '';
    for (const cat of ingredientCategories) {
      const found = cat.items.find(i => i.name === name);
      if (found) { emoji = found.emoji; break; }
    }
    html += `<span class="selected-tag">
      ${emoji} ${name}
      <span class="remove" data-ingredient="${name}">×</span>
    </span>`;
  });
  tagsContainer.innerHTML = html;

  // 绑定移除事件
  tagsContainer.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedIngredients.delete(btn.dataset.ingredient);
      updateSelectedBar();
      renderIngredients();
      renderRecipes();
    });
  });
}

// ==================== 食谱匹配与排序 ====================
function matchAndSortRecipes() {
  const selected = Array.from(selectedIngredients);

  if (selected.length === 0) {
    return recipes.map(r => ({ ...r, matchCount: 0, matched: [], missing: r.ingredients }));
  }

  return recipes.map(recipe => {
    const matched = recipe.ingredients.filter(ing => selected.includes(ing));
    const missing = recipe.ingredients.filter(ing => !selected.includes(ing));
    return {
      ...recipe,
      matchCount: matched.length,
      matched,
      missing,
    };
  }).sort((a, b) => {
    // 先按匹配数降序，再按缺失数升序
    if (b.matchCount !== a.matchCount) return b.matchCount - a.matchCount;
    return a.missing.length - b.missing.length;
  });
}

// ==================== 渲染食谱卡片 ====================
function renderRecipes() {
  const grid = document.getElementById('recipeGrid');
  const count = document.getElementById('resultsCount');

  let results = matchAndSortRecipes();

  // 分类筛选
  if (currentFilter !== 'all') {
    results = results.filter(r => r.category === currentFilter);
  }

  count.textContent = `共 ${results.length} 道食谱`;

  if (results.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="icon">🍽️</div>
        <h3>还没有匹配的食谱</h3>
        <p>尝试选择更多食材，或切换到"全部食谱"查看更多选项</p>
      </div>`;
    return;
  }

  const badgeClass = {
    '汤羹': 'badge-soup',
    '炒菜': 'badge-stir',
    '炖菜': 'badge-stew',
    '凉拌': 'badge-cold',
    '主食': 'badge-staple',
  };

  let html = '';
  results.forEach(recipe => {
    // 匹配/缺失食材标签
    let matchHtml = '';
    if (selectedIngredients.size > 0) {
      recipe.matched.forEach(m => {
        matchHtml += `<span class="match-tag">✅ ${m}</span>`;
      });
      recipe.missing.forEach(m => {
        matchHtml += `<span class="match-tag miss">➕ ${m}</span>`;
      });
    } else {
      recipe.ingredients.forEach(m => {
        matchHtml += `<span class="match-tag">📌 ${m}</span>`;
      });
    }

    html += `
      <div class="recipe-card">
        <div class="recipe-card-top">
          <span class="recipe-name">${recipe.name}</span>
          <span class="recipe-badge ${badgeClass[recipe.category] || ''}">${recipe.category}</span>
        </div>
        <div class="recipe-card-body">
          <div class="recipe-match">${matchHtml}</div>
          <p class="recipe-desc">${recipe.desc}</p>
        </div>
        <div class="recipe-card-bottom">
          <a class="recipe-link video" href="${recipe.videoUrl}" target="_blank" rel="noopener">
            ▶️ 视频教程
          </a>
          <a class="recipe-link text" href="${recipe.textUrl}" target="_blank" rel="noopener">
            📖 图文做法
          </a>
        </div>
      </div>`;
  });

  grid.innerHTML = html;
}

// ==================== 分类筛选 ====================
function setupFilters() {
  const filterBtns = document.querySelectorAll('.filter-btn');
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderRecipes();
    });
  });
}

// ==================== 清空按钮 ====================
document.getElementById('clearBtn').addEventListener('click', () => {
  selectedIngredients.clear();
  updateSelectedBar();
  renderIngredients();
  renderRecipes();
});

// ==================== 初始化 ====================
function init() {
  renderIngredients();
  updateSelectedBar();
  setupFilters();
  renderRecipes();
}

init();
</script>

</body>
</html>
